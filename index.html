<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>Peta klasifikasi kepadatan penduduk DIY</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/kepsdatanpendudukkepadatan_penduduk_yogyakarta_1.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-7.867619549957712,110.28314727292914],[-7.755370919761055,110.45152021822412]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var title = new L.Control({'position':'topright'});
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<h2>Peta klasifikasi kepadatan penduduk DIY</h2>';
        };
        title.addTo(map);
        var abstract = new L.Control({'position':'topright'});
        abstract.onAdd = function (map) {
            this._div = L.DomUtil.create('div',
            'leaflet-control abstract');
            this._div.id = 'abstract'

                abstract.show();
                return this._div;
            };
            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'peta ini memberikan informasi kepadatan penduduk, jumlah penduduk, dan luar wilayah daerah yogyakarta. Sumber data BPS tahun 2024<br />Di Buat Oleh : Naufal Pratama Putra<br /><br />';
        };
        abstract.addTo(map);
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OSMStandard_0');
        map.getPane('pane_OSMStandard_0').style.zIndex = 400;
        var layer_OSMStandard_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OSMStandard_0',
            opacity: 1.0,
            attribution: '<a href="https://www.openstreetmap.org/copyright">© OpenStreetMap contributors, CC-BY-SA</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OSMStandard_0;
        map.addLayer(layer_OSMStandard_0);
        function pop_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">nama kecamatan</th>\
                        <td>' + (feature.properties['WADMKC'] !== null ? autolinker.link(String(feature.properties['WADMKC']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Luas Wilayah (ha)</th>\
                        <td>' + (feature.properties['Join_Luas (ha)'] !== null ? autolinker.link(String(feature.properties['Join_Luas (ha)']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Jumlah Penduduk (Ribu)</th>\
                        <td>' + (feature.properties['Join_Penduduk (ribu)'] !== null ? autolinker.link(String(feature.properties['Join_Penduduk (ribu)']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Kepadatan Penduduk (Ribu per km2)</th>\
                        <td>' + (feature.properties['Join_Kepadatan Penduduk (per km2)'] !== null ? autolinker.link(String(feature.properties['Join_Kepadatan Penduduk (per km2)']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Join_Cuaca Ekstrem</th>\
                        <td>' + (feature.properties['Join_Cuaca Ekstrem'] !== null ? autolinker.link(String(feature.properties['Join_Cuaca Ekstrem']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1_0(feature) {
            if (feature.properties['q2wHide_Join.__Kepadatan Penduduk (per km2)'] >= 8.225035 && feature.properties['q2wHide_Join.__Kepadatan Penduduk (per km2)'] <= 12.025243 ) {
                return {
                pane: 'pane_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(195,104,171,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['q2wHide_Join.__Kepadatan Penduduk (per km2)'] >= 12.025243 && feature.properties['q2wHide_Join.__Kepadatan Penduduk (per km2)'] <= 13.908058 ) {
                return {
                pane: 'pane_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(131,12,255,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['q2wHide_Join.__Kepadatan Penduduk (per km2)'] >= 13.908058 && feature.properties['q2wHide_Join.__Kepadatan Penduduk (per km2)'] <= 18.358120 ) {
                return {
                pane: 'pane_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,0,229,1.0)',
                interactive: true,
            }
            }
        }
        map.createPane('pane_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1');
        map.getPane('pane_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1').style.zIndex = 401;
        map.getPane('pane_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1').style['mix-blend-mode'] = 'normal';
        var layer_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1 = new L.geoJson(json_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1',
            layerName: 'layer_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1',
            pane: 'pane_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1',
            onEachFeature: pop_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1,
            style: style_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1_0,
        });
        bounds_group.addLayer(layer_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1);
        map.addLayer(layer_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1);
        var overlaysTree = [
            {label: 'kepsdatan penduduk — kepadatan_penduduk_yogyakarta<br /><table><tr><td style="text-align: center;"><img src="legend/kepsdatanpendudukkepadatan_penduduk_yogyakarta_1_8212perkm20.png" /></td><td>(8,2 - 12 per km 2)</td></tr><tr><td style="text-align: center;"><img src="legend/kepsdatanpendudukkepadatan_penduduk_yogyakarta_1_12139perkm21.png" /></td><td>(12 - 13,9 per km2)</td></tr><tr><td style="text-align: center;"><img src="legend/kepsdatanpendudukkepadatan_penduduk_yogyakarta_1_139184perkm22.png" /></td><td>(13,9 - 18,4 per km2)</td></tr></table>', layer: layer_kepsdatanpendudukkepadatan_penduduk_yogyakarta_1},
            {label: "OSM Standard", layer: layer_OSMStandard_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        </script>        
    </body>
</html>
